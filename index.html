<!DOCTYPE html>
<html lang="zh-CN">
<head>

        }

            padding: 20px 16px 40px;
            min-height: 100vh;
        }

        .test-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);

        }
        .badge {
            display: inline-block;
            background: #ff5e7c15;
            color: #ff5e7c;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 30px;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #2c3e50, #ff5e7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .sub {
            font-size: 15px;
            color: #7e7e8c;
            line-height: 1.4;
        }

        .progress-area {
            margin-bottom: 28px;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 500;
            color: #ff5e7c;
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            background: #efefef;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: #ff5e7c;
            width: 0%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 22px;
            font-weight: 640;
            line-height: 1.35;
            margin-bottom: 28px;
            color: #1e1e2a;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 32px;
        }

        .option-btn {
            background: #f9f9fb;
            border: 1px solid #ececf0;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 500;
            color: #2c2c34;
            text-align: left;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option-btn:hover {
            background: #fff0f3;
            border-color: #ffb6c1;
            transform: scale(0.99);
        }
        .option-prefix {
            width: 28px;
            height: 28px;
            background: #fff0f2;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #ff5e7c;
        }
        .option-btn.selected {
            background: #ffeff2;
            border-color: #ff5e7c;
            box-shadow: 0 2px 8px rgba(255, 94, 124, 0.15);
        }
        .option-btn.selected .option-prefix {
            background: #ff5e7c;
            color: white;
        }

        .next-btn {
            background: #1e1e2a;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 16px 0;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .next-btn:active {
            transform: scale(0.97);
            background: #000000;
        }
        .next-btn.disabled {
            background: #cdcdd4;
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        .result-city {
            text-align: center;
            margin-bottom: 24px;
        }
        .city-name {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(120deg, #ff5e7c, #f7b05e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 12px 0 6px;
        }
        .match-rate {
            background: #eef2ff;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: #ff5e7c;
        }
        .dimension-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 28px 0 24px;
        }
        .dim-item {
            flex: 1 1 calc(33% - 12px);
            background: #faf9fc;
            border-radius: 24px;
            padding: 12px 8px;
            text-align: center;
        }
        .dim-label {
            font-size: 13px;
            color: #6c6c7a;
            margin-bottom: 8px;
        }
        .dim-score {
            font-size: 20px;
            font-weight: 700;
            color: #ff5e7c;
        }
        .dim-bar-bg {
            background: #e4e4e9;
            height: 5px;
            border-radius: 6px;
            width: 100%;
            margin-top: 6px;
        }
        .dim-bar {
            background: #ff5e7c;
            height: 5px;
            border-radius: 6px;
            width: 0%;
        }
        .analysis-text {
            background: #fef6f0;
            border-radius: 24px;
            padding: 20px;
            font-size: 14px;
            line-height: 1.5;
            color: #3e3e4a;
            margin: 20px 0;
        }
        .other-cities {
            margin-top: 28px;
            border-top: 1px solid #efefef;
            padding-top: 20px;
        }
        .other-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .city-rank {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed #ececf0;
        }
        .restart-btn {
            background: transparent;
            border: 1px solid #ff5e7c;
            color: #ff5e7c;
            border-radius: 40px;
            padding: 12px 0;
            font-weight: 600;
            width: 100%;
            margin-top: 24px;
            cursor: pointer;
            transition: 0.2s;
        }
        .restart-btn:active {
            background: #fff0f3;
        }
        footer {
            text-align: center;
            font-size: 12px;
            color: #aaa;
            margin-top: 24px;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 480px) {
            .card {
                padding: 20px 18px;
            }
            .question-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
<div class="test-container" id="app">
    <!-- 开始屏 -->

    </div>
</div>

            { text: "无所谓，很少外食", scores: [1,1,0,1,0,0] }
          ] },
        // 17. 人口密度偏好
        { text: "你更喜欢城市的人口密度？", tag: "居住偏好",
          options: [
            { text: "繁华中心，人流密集", scores: [1,2,1,1,0,0] },
            { text: "适中，不太拥挤也不冷清", scores: [0,1,2,1,2,2] },
            { text: "低密度，安静宜居", scores: [0,0,1,0,2,2] },
            { text: "无所谓，能适应", scores: [1,1,1,1,1,1] }
          ] },
        // 18. 国际化程度需求
        { text: "你对城市国际化程度的要求？", tag: "国际视野",
          options: [
            { text: "必须高度国际化，国际航班/外企多", scores: [1,3,0,1,0,0] },
            { text: "有一定国际化元素即可", scores: [1,1,1,1,1,0] },
            { text: "本土文化浓厚就行", scores: [0,0,2,0,1,2] },
            { text: "无所谓，不在乎", scores: [0,0,1,0,0,1] }
          ] },
        // 19. 子女教育考量（如有）
        { text: "未来子女教育是你选择城市的考量因素吗？", tag: "家庭规划",
          options: [
            { text: "非常重要，教育资源优先", scores: [3,2,1,1,1,0] },
            { text: "比较重要，会考虑", scores: [2,2,1,1,1,0] },
            { text: "目前不重要，但未来可能", scores: [1,1,1,1,1,1] },
            { text: "完全不考虑", scores: [0,0,1,0,1,1] }
          ] },
        // 20. 自然环境偏好深度
        { text: "你更偏爱哪种自然环境？", tag: "生态偏好",
          options: [
            { text: "山川湖泊，森林环绕", scores: [0,0,1,1,3,2] },
            { text: "海滨城市，沙滩海风", scores: [0,1,3,3,1,0] },
            { text: "城市公园，绿化好就行", scores: [1,1,1,1,2,2] },
            { text: "无所谓，城市便利更重要", scores: [2,2,1,1,0,0] }
          ] }
    ];

    const TOTAL_QS = QUESTIONS.length; // 20题

    // 状态变量
    let userScores = [0,0,0,0,0,0];
    let currentQuestionIndex = 0;
    let selectedOptionIndex = null;

    // DOM 元素
    const startView = document.getElementById('startView');
    const quizView = document.getElementById('quizView');
    const resultView = document.getElementById('resultView');
    const startBtn = document.getElementById('startBtn');
    const nextQuizBtn = document.getElementById('nextQuizBtn');
    const questionTextEl = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const qCounterSpan = document.getElementById('qCounter');
    const qTagSpan = document.getElementById('qTag');
    const progressFill = document.getElementById('progressFill');
    const restartFromResult = document.getElementById('restartFromResult');

    // 辅助函数
    function resetQuiz() {
        userScores = [0,0,0,0,0,0];
        currentQuestionIndex = 0;
        selectedOptionIndex = null;
        renderCurrentQuestion();
        updateNextButtonState();
        updateProgress();
    }

    function updateProgress() {
        const percent = (currentQuestionIndex / TOTAL_QS) * 100;
        progressFill.style.width = `${percent}%`;
        qCounterSpan.innerText = `第${currentQuestionIndex+1} / ${TOTAL_QS}题`;
        if(currentQuestionIndex < TOTAL_QS) {
            qTagSpan.innerText = QUESTIONS[currentQuestionIndex].tag;
        }
    }

    function updateNextButtonState() {
        if(selectedOptionIndex !== null) {
            nextQuizBtn.classList.remove('disabled');
        } else {
            nextQuizBtn.classList.add('disabled');
        }
    }

    function renderCurrentQuestion() {
        if(currentQuestionIndex >= TOTAL_QS) return;
        const q = QUESTIONS[currentQuestionIndex];
        questionTextEl.innerText = q.text;
        qTagSpan.innerText = q.tag;
        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            if(selectedOptionIndex === idx) btn.classList.add('selected');
            const prefixSpan = document.createElement('span');
            prefixSpan.className = 'option-prefix';
            prefixSpan.innerText = String.fromCharCode(65+idx);
            const textSpan = document.createElement('span');
            textSpan.innerText = opt.text;
            btn.appendChild(prefixSpan);
            btn.appendChild(textSpan);
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
                btn.classList.add('selected');
                selectedOptionIndex = idx;
                updateNextButtonState();
            });
            optionsContainer.appendChild(btn);
        });
        updateProgress();
    }

    function saveCurrentAnswerAndMove() {
        if(selectedOptionIndex === null) return false;
        const q = QUESTIONS[currentQuestionIndex];
        const selectedScores = q.options[selectedOptionIndex].scores;
        for(let i=0; i<cityIds.length; i++) {
            userScores[i] += selectedScores[i];
        }
        currentQuestionIndex++;
        selectedOptionIndex = null;
        if(currentQuestionIndex < TOTAL_QS) {
            renderCurrentQuestion();
            updateNextButtonState();
            return true;
        } else {
            finishQuizAndShowResult();
            return true;
        }
    }

    function finishQuizAndShowResult() {
        // 计算最高分城市
        let maxScore = -1;
        let bestIdx = 0;
        let scoreList = userScores.map((score, idx) => ({ idx, score, cityId: cityIds[idx] }));
        scoreList.sort((a,b) => b.score - a.score);
        const bestCityId = scoreList[0].cityId;
        const bestCity = cityMap[bestCityId];
        const maxRawScore = scoreList[0].score;
        const maxPossible = TOTAL_QS * 3;   // 20题 * 3 = 60分
        let matchPercentRaw = (maxRawScore / maxPossible) * 100;
        let matchPercent = Math.min(99, Math.floor(matchPercentRaw)) + (matchPercentRaw % 1 > 0.3 ? 1 : 0);
        matchPercent = Math.max(68, matchPercent);
        
        document.getElementById('resultCityName').innerText = bestCity.name;
        document.getElementById('matchPercent').innerHTML = `✨ 综合匹配度 ${matchPercent}% ✨`;
        
        // 多维分析（展示推荐城市的维度指标）
        const dims = bestCity.dimensions;
        const dimLabels = {
            career: "职业机遇", lifestyle: "生活节奏", culture: "文化活力",
            nature: "自然环境", cost: "生活成本友好", social: "社交氛围"
        };
        const dimArea = document.getElementById('dimensionArea');
        dimArea.innerHTML = '';
        for(let [key, val] of Object.entries(dims)) {
            const percentBar = (val / 10) * 100;
            const div = document.createElement('div');
            div.className = 'dim-item';
            div.innerHTML = `
                <div class="dim-label">${dimLabels[key]}</div>
                <div class="dim-score">${val.toFixed(1)}</div>
                <div class="dim-bar-bg"><div class="dim-bar" style="width: ${percentBar}%;"></div></div>
            `;
            dimArea.appendChild(div);
        }
        
        // 个性化分析文本（基于最佳城市）
        let matchHighlights = [];
        if(bestCityId === 'beijing') matchHighlights = ['你渴望顶级平台与资源', '抗压能力强且有野心', '对历史文化沉淀有归属感'];
        else if(bestCityId === 'shanghai') matchHighlights = ['追求效率与精致生活', '向往国际化视野', '热爱潮流与前沿商业'];
        else if(bestCityId === 'guangzhou') matchHighlights = ['务实且重视生活性价比', '喜欢烟火气与人情味', '对美食与商贸氛围心动'];
        else if(bestCityId === 'shenzhen') matchHighlights = ['拥抱变化与创新', '年轻敢闯敢拼', '向往科技生态和新鲜事物'];
        else if(bestCityId === 'hangzhou') matchHighlights = ['追求工作与生活平衡', '热爱自然与数字经济', '重视文化与互联网机遇'];
        else matchHighlights = ['偏爱松弛感和幸福感', '享受美食与慢节奏', '喜欢包容热情的社交氛围'];
        
        const analysisDiv = document.getElementById('personalAnalysis');
        analysisDiv.innerHTML = `
            🧭 <strong>${bestCity.name} · 为什么适合你？</strong><br>
            基于20道深度问题，你的职业倾向、生活方式偏好与 ${bestCity.name} 的城市基因高度共鸣：<br>
            ${matchHighlights.map(h => `✔️ ${h}`).join('<br>')}<br><br>
            📍 ${bestCity.desc}
        `;
        
        // 其他城市排名（展示前三）
        const otherContainer = document.getElementById('otherCitiesRank');
        otherContainer.innerHTML = `<div class="other-title">🏙️ 其他潜力城市匹配度</div>`;
        const top3 = scoreList.slice(1,4);
        top3.forEach(item => {
            const city = cityMap[item.cityId];
            const scorePercent = Math.floor((item.score / maxPossible)*100);
            otherContainer.innerHTML += `
                <div class="city-rank">
                    <span><strong>${city.name}</strong>  ${city.short}</span>
                    <span style="color:#ff5e7c; font-weight:500;">匹配 ${scorePercent}%</span>
                </div>
            `;
        });
        
        // 切换视图
        startView.classList.add('hidden');
        quizView.classList.add('hidden');
        resultView.classList.remove('hidden');
    }

    // 事件绑定
    startBtn.addEventListener('click', () => {
        startView.classList.add('hidden');
        quizView.classList.remove('hidden');
        resetQuiz();
    });
    
    nextQuizBtn.addEventListener('click', () => {
        if(nextQuizBtn.classList.contains('disabled')) return;
        saveCurrentAnswerAndMove();
    });
    
    restartFromResult.addEventListener('click', () => {
        startView.classList.remove('hidden');
        resultView.classList.add('hidden');
        quizView.classList.add('hidden');
        userScores = [0,0,0,0,0,0];
        currentQuestionIndex = 0;
        selectedOptionIndex = null;
    });
    
    function init() {
        startView.classList.remove('hidden');
        quizView.classList.add('hidden');
        resultView.classList.add('hidden');
    }
    init();
</script>
</body>
</html>
